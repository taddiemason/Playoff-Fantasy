name = "fantasy"
main = "worker/index.js"
compatibility_date = "2026-04-06"

[build]
command = "npm run build"

[assets]
directory = "./client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "fantasyhockey"
database_id = "947587fd-a195-4f3a-adcc-874a9f35e906"
migrations_dir = "migrations"

[vars]
NODE_ENV = "production"

[triggers]
crons = ["0 * * * *"]

[[durable_objects.bindings]]
name = "DRAFT_ROOM"
class_name = "DraftRoom"

[[durable_objects.bindings]]
name = "AUCTION_ROOM"
class_name = "AuctionRoom"

[[migrations]]
tag = "v1"
new_classes = ["DraftRoom"]

[[migrations]]
tag = "v2"
new_classes = ["AuctionRoom"]

[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v3"
new_classes = ["ChatRoom"]
